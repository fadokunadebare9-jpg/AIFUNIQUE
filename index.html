<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AIF Unique Concept — Management System</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #020c1b; font-family: 'Segoe UI', sans-serif; }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #020c1b; }
    ::-webkit-scrollbar-thumb { background: #1a3a6b; border-radius: 3px; }
    select option { background: #040f20; color: #fff; }
    input[type=number]::-webkit-inner-spin-button { -webkit-appearance: none; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useMemo } = React;

    const PRODUCTS = ["Petroleum", "Diesel", "Domestic Gas", "Industrial Gas"];
    const DEPOTS = ["Apapa", "Ibafon", "Tincan", "Calabar", "Warri", "Port Harcourt", "Onne", "Oghara", "Koko"];
    const STORAGE_KEY = "aif_transactions";
    const CRED_KEY = "aif_credentials";

    const getCredentials = () => { try { return JSON.parse(localStorage.getItem(CRED_KEY)) || { username:"aif_admin", password:"AIF@2026" }; } catch { return { username:"aif_admin", password:"AIF@2026" }; } };
    const saveCredentials = (c) => localStorage.setItem(CRED_KEY, JSON.stringify(c));
    const fmt = (n) => Number(n||0).toLocaleString("en-NG", { minimumFractionDigits:2 });
    const profit = (r) => Number(r.sellingPrice||0) - Number(r.productPrice||0) - Number(r.loadingExpenses||0) - Number(r.truckExpenses||0);
    const loadRecords = () => { try { return JSON.parse(localStorage.getItem(STORAGE_KEY))||[]; } catch { return []; } };
    const saveRecords = (d) => localStorage.setItem(STORAGE_KEY, JSON.stringify(d));

    function exportCSV(records) {
      const headers = ["Date & Time","Product","Loading Depot","Buyer Name","Product Price (N)","Selling Price (N)","Loading Expenses (N)","Truck Expenses (N)","Net Profit (N)","Remarks"];
      const rows = records.map(r=>[r.datetime,r.product,r.depot,r.buyerName,r.productPrice,r.sellingPrice,r.loadingExpenses,r.truckExpenses,profit(r).toFixed(2),r.remarks]);
      const csv = [headers,...rows].map(r=>r.map(c=>`"${String(c||"").replace(/"/g,'""')}"`).join(",")).join("\n");
      const blob = new Blob([csv],{type:"text/csv"});
      const a = document.createElement("a"); a.href=URL.createObjectURL(blob); a.download=`AIF_Transactions_${new Date().toLocaleDateString("en-NG").replace(/\//g,"-")}.csv`; a.click();
    }

    function exportPDF(records) {
      const win = window.open("","_blank");
      const totalRevenue = records.reduce((s,r)=>s+Number(r.sellingPrice||0),0);
      const totalProfit = records.reduce((s,r)=>s+profit(r),0);
      const rows = records.map(r=>`<tr><td>${r.datetime}</td><td><b>${r.product}</b></td><td>${r.depot}</td><td>${r.buyerName}</td><td>N${fmt(r.productPrice)}</td><td>N${fmt(r.sellingPrice)}</td><td>N${fmt(r.loadingExpenses)}</td><td>N${fmt(r.truckExpenses)}</td><td style="color:${profit(r)>=0?'#16a34a':'#dc2626'};font-weight:700">N${fmt(profit(r))}</td><td>${r.remarks||"—"}</td></tr>`).join("");
      win.document.write(`<!DOCTYPE html><html><head><title>AIF Transactions</title><style>body{font-family:Arial;font-size:11px;color:#111;padding:24px}.header{display:flex;justify-content:space-between;margin-bottom:20px;padding-bottom:16px;border-bottom:2px solid #003399}.logo{font-size:20px;font-weight:900;color:#003399}.logo span{color:#f97316}.summary{display:flex;gap:16px;margin-bottom:20px}.sum-box{background:#f0f4ff;border:1px solid #c7d7ff;border-radius:6px;padding:10px 16px;flex:1;text-align:center}.sum-box .val{font-size:16px;font-weight:700;color:#003399}.sum-box .lbl{font-size:10px;color:#666;margin-top:2px}table{width:100%;border-collapse:collapse}th{background:#003399;color:#fff;padding:7px 8px;text-align:left;font-size:10px}td{padding:6px 8px;border-bottom:1px solid #e5e7eb;font-size:10px}tr:nth-child(even) td{background:#f8faff}.footer{margin-top:20px;text-align:center;color:#999;font-size:10px;border-top:1px solid #eee;padding-top:12px}</style></head><body><div class="header"><div><div class="logo">AIF <span>UNIQUE</span> CONCEPT</div><div style="color:#666;font-size:11px;margin-top:4px">Petroleum Products — Transaction Report</div></div><div style="text-align:right;color:#666;font-size:11px"><div>Generated: ${new Date().toLocaleString()}</div><div>Total Records: ${records.length}</div></div></div><div class="summary"><div class="sum-box"><div class="val">${records.length}</div><div class="lbl">Transactions</div></div><div class="sum-box"><div class="val" style="color:#16a34a">N${fmt(totalRevenue)}</div><div class="lbl">Total Revenue</div></div><div class="sum-box"><div class="val" style="color:${totalProfit>=0?'#16a34a':'#dc2626'}">N${fmt(totalProfit)}</div><div class="lbl">Net Profit</div></div></div><table><thead><tr><th>Date & Time</th><th>Product</th><th>Depot</th><th>Buyer</th><th>Cost Price</th><th>Sell Price</th><th>Load Exp</th><th>Truck Exp</th><th>Net Profit</th><th>Remarks</th></tr></thead><tbody>${rows}</tbody></table><div class="footer">AIF Unique Concept — Confidential Internal Document</div></body></html>`);
      win.document.close(); setTimeout(()=>win.print(),500);
    }

    // ── LOGIN ──
    function LoginPage({ onLogin }) {
      const [u,setU]=useState(""); const [p,setP]=useState(""); const [err,setErr]=useState(""); const [loading,setLoading]=useState(false); const [showPass,setShowPass]=useState(false);
      const handle = () => {
        if (!u||!p){setErr("Please enter both fields.");return;}
        setLoading(true);
        setTimeout(()=>{ const creds=getCredentials(); if(u===creds.username&&p===creds.password){onLogin();}else{setErr("Invalid credentials. Access denied.");setLoading(false);}},900);
      };
      return (
        <div style={{minHeight:"100vh",background:"#020c1b",display:"flex",alignItems:"center",justifyContent:"center",position:"relative",overflow:"hidden"}}>
          <div style={{position:"absolute",inset:0,backgroundImage:"linear-gradient(rgba(0,100,200,0.06) 1px,transparent 1px),linear-gradient(90deg,rgba(0,100,200,0.06) 1px,transparent 1px)",backgroundSize:"40px 40px"}}/>
          <div style={{position:"absolute",width:600,height:600,borderRadius:"50%",background:"radial-gradient(circle,rgba(0,80,200,0.12),transparent 70%)",top:"50%",left:"50%",transform:"translate(-50%,-50%)",pointerEvents:"none"}}/>
          <div style={{position:"relative",background:"rgba(4,15,32,0.97)",border:"1px solid rgba(0,100,255,0.2)",borderRadius:16,padding:"48px 40px",width:"100%",maxWidth:420,boxShadow:"0 25px 60px rgba(0,0,0,0.6)"}}>
            <div style={{textAlign:"center",marginBottom:36}}>
              <div style={{width:60,height:60,background:"linear-gradient(135deg,#003d99,#0066ff)",borderRadius:14,display:"inline-flex",alignItems:"center",justifyContent:"center",fontSize:28,marginBottom:16,boxShadow:"0 0 30px rgba(0,100,255,0.35)"}}>⛽</div>
              <h1 style={{color:"#fff",fontSize:22,fontWeight:800,margin:"0 0 6px",letterSpacing:1.5}}>AIF UNIQUE CONCEPT</h1>
              <p style={{color:"#3a6a9b",fontSize:13}}>Internal Management System</p>
            </div>
            <div style={{marginBottom:18}}>
              <label style={{display:"block",color:"#5a8ab0",fontSize:11,fontWeight:700,marginBottom:7,letterSpacing:1.2,textTransform:"uppercase"}}>Username</label>
              <input type="text" value={u} onChange={e=>{setU(e.target.value);setErr("");}} onKeyDown={e=>e.key==="Enter"&&handle()} placeholder="Enter username"
                style={{width:"100%",padding:"12px 16px",background:"rgba(255,255,255,0.04)",border:"1px solid rgba(0,100,255,0.2)",borderRadius:8,color:"#fff",fontSize:14,outline:"none",boxSizing:"border-box"}}/>
            </div>
            <div style={{marginBottom:20}}>
              <label style={{display:"block",color:"#5a8ab0",fontSize:11,fontWeight:700,marginBottom:7,letterSpacing:1.2,textTransform:"uppercase"}}>Password</label>
              <div style={{position:"relative"}}>
                <input type={showPass?"text":"password"} value={p} onChange={e=>{setP(e.target.value);setErr("");}} onKeyDown={e=>e.key==="Enter"&&handle()} placeholder="Enter password"
                  style={{width:"100%",padding:"12px 44px 12px 16px",background:"rgba(255,255,255,0.04)",border:"1px solid rgba(0,100,255,0.2)",borderRadius:8,color:"#fff",fontSize:14,outline:"none",boxSizing:"border-box"}}/>
                <button onClick={()=>setShowPass(!showPass)} style={{position:"absolute",right:12,top:"50%",transform:"translateY(-50%)",background:"none",border:"none",color:"#3a6a9b",cursor:"pointer",fontSize:16}}>{showPass?"🙈":"👁"}</button>
              </div>
            </div>
            {err&&<div style={{background:"rgba(239,68,68,0.1)",border:"1px solid rgba(239,68,68,0.25)",borderRadius:7,padding:"10px 14px",color:"#f87171",fontSize:13,marginBottom:18,textAlign:"center"}}>⚠ {err}</div>}
            <button onClick={handle} disabled={loading} style={{width:"100%",padding:"13px",background:loading?"#1a3a6b":"linear-gradient(135deg,#003d99,#0066ff)",color:"#fff",border:"none",borderRadius:8,fontSize:15,fontWeight:800,cursor:loading?"not-allowed":"pointer",letterSpacing:1.5,boxShadow:"0 4px 20px rgba(0,100,255,0.25)"}}>
              {loading?"⏳ AUTHENTICATING...":"🔓 ACCESS SYSTEM"}
            </button>
            <p style={{color:"#1a3a5b",fontSize:11,textAlign:"center",marginTop:20}}>🔒 Restricted — AIF Authorised Personnel Only</p>
          </div>
        </div>
      );
    }

    // ── SIDEBAR ──
    function Sidebar({ page, setPage, onLogout, collapsed, setCollapsed }) {
      const nav=[["dashboard","📊","Dashboard"],["entry","✏️","New Entry"],["records","📋","Records"],["settings","⚙️","Settings"]];
      return (
        <div style={{width:collapsed?60:220,minHeight:"100vh",background:"#040f20",borderRight:"1px solid rgba(0,100,255,0.12)",display:"flex",flexDirection:"column",flexShrink:0,transition:"width 0.2s"}}>
          <div style={{padding:collapsed?"18px 10px":"22px 18px 18px",borderBottom:"1px solid rgba(0,100,255,0.1)",display:"flex",alignItems:"center",justifyContent:collapsed?"center":"space-between"}}>
            {!collapsed&&<div style={{display:"flex",alignItems:"center",gap:10}}><div style={{width:34,height:34,background:"linear-gradient(135deg,#003d99,#0066ff)",borderRadius:8,display:"flex",alignItems:"center",justifyContent:"center",fontSize:16,flexShrink:0}}>⛽</div><div><div style={{color:"#fff",fontSize:12,fontWeight:800,letterSpacing:0.5}}>AIF UNIQUE</div><div style={{color:"#3a6a9b",fontSize:10}}>CONCEPT</div></div></div>}
            {collapsed&&<div style={{fontSize:18}}>⛽</div>}
            <button onClick={()=>setCollapsed(!collapsed)} style={{background:"none",border:"none",color:"#3a6a9b",cursor:"pointer",fontSize:16,padding:0}}>{collapsed?"→":"←"}</button>
          </div>
          <nav style={{flex:1,padding:"14px 8px"}}>
            {nav.map(([id,icon,label])=>(
              <button key={id} onClick={()=>setPage(id)}
                style={{width:"100%",display:"flex",alignItems:"center",gap:collapsed?0:12,justifyContent:collapsed?"center":"flex-start",padding:collapsed?"12px 0":"11px 12px",borderRadius:8,border:"none",background:page===id?"rgba(0,100,255,0.15)":"transparent",color:page===id?"#4d9fff":"#4a6a8a",cursor:"pointer",fontSize:collapsed?20:14,fontWeight:page===id?700:400,marginBottom:4,borderLeft:page===id?"3px solid #0066ff":"3px solid transparent",transition:"all 0.15s"}}>
                <span>{icon}</span>{!collapsed&&label}
              </button>
            ))}
          </nav>
          <div style={{padding:"14px 8px",borderTop:"1px solid rgba(0,100,255,0.1)"}}>
            <button onClick={onLogout} style={{width:"100%",padding:collapsed?"10px 0":"9px 12px",background:"rgba(239,68,68,0.08)",border:"1px solid rgba(239,68,68,0.18)",borderRadius:8,color:"#ef4444",cursor:"pointer",fontSize:collapsed?18:13,fontWeight:600,display:"flex",alignItems:"center",justifyContent:"center",gap:collapsed?0:8}}>
              🚪{!collapsed&&" Logout"}
            </button>
          </div>
        </div>
      );
    }

    // ── DASHBOARD ──
    function Dashboard({ records, setPage }) {
      const totalRevenue=records.reduce((s,r)=>s+Number(r.sellingPrice||0),0);
      const totalCost=records.reduce((s,r)=>s+Number(r.productPrice||0)+Number(r.loadingExpenses||0)+Number(r.truckExpenses||0),0);
      const totalProfit=totalRevenue-totalCost;
      const stats=[{label:"Total Transactions",value:records.length,icon:"📦",color:"#3b82f6"},{label:"Total Revenue",value:`₦${fmt(totalRevenue)}`,icon:"💰",color:"#22c55e"},{label:"Total Expenses",value:`₦${fmt(totalCost)}`,icon:"📉",color:"#f59e0b"},{label:"Net Profit / Loss",value:`₦${fmt(totalProfit)}`,icon:totalProfit>=0?"📈":"📉",color:totalProfit>=0?"#22c55e":"#ef4444"}];
      const recent=[...records].reverse().slice(0,6);
      const productTotals=PRODUCTS.map(p=>({name:p,count:records.filter(r=>r.product===p).length}));
      return (
        <div style={{padding:28,overflowY:"auto"}}>
          <div style={{marginBottom:24}}><h2 style={{color:"#fff",fontSize:22,fontWeight:800,marginBottom:4}}>Dashboard</h2><p style={{color:"#3a6a9b",fontSize:13}}>Welcome back — here's your business overview</p></div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(190px,1fr))",gap:14,marginBottom:28}}>
            {stats.map(s=>(
              <div key={s.label} style={{background:"rgba(4,15,32,0.9)",border:`1px solid ${s.color}28`,borderRadius:12,padding:"20px 22px",borderTop:`3px solid ${s.color}`}}>
                <div style={{fontSize:26,marginBottom:10}}>{s.icon}</div>
                <div style={{color:s.color,fontSize:20,fontWeight:800,marginBottom:4}}>{s.value}</div>
                <div style={{color:"#3a6a9b",fontSize:12}}>{s.label}</div>
              </div>
            ))}
          </div>
          <div style={{display:"grid",gridTemplateColumns:"2fr 1fr",gap:16}}>
            <div style={{background:"rgba(4,15,32,0.9)",border:"1px solid rgba(0,100,255,0.12)",borderRadius:12,padding:22}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
                <h3 style={{color:"#fff",fontSize:15,fontWeight:700}}>Recent Transactions</h3>
                <button onClick={()=>setPage("records")} style={{background:"none",border:"none",color:"#3b82f6",cursor:"pointer",fontSize:12}}>View all →</button>
              </div>
              {recent.length===0?(
                <div style={{textAlign:"center",padding:"24px 0",color:"#3a6a9b"}}>
                  <div style={{fontSize:32,marginBottom:8}}>📭</div><p style={{fontSize:13}}>No transactions yet</p>
                  <button onClick={()=>setPage("entry")} style={{marginTop:12,padding:"8px 18px",background:"rgba(0,100,255,0.15)",border:"1px solid rgba(0,100,255,0.3)",borderRadius:6,color:"#4d9fff",cursor:"pointer",fontSize:12}}>Add First Entry</button>
                </div>
              ):(
                <table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}>
                  <thead><tr>{["Date","Product","Buyer","Profit"].map(h=><th key={h} style={{color:"#3a6a9b",textAlign:"left",padding:"6px 10px",fontWeight:600,fontSize:10,textTransform:"uppercase",letterSpacing:0.8,borderBottom:"1px solid rgba(0,100,255,0.1)"}}>{h}</th>)}</tr></thead>
                  <tbody>{recent.map((r,i)=><tr key={i}><td style={{padding:"9px 10px",color:"#5a8ab0",fontSize:11}}>{r.datetime.split(",")[0]}</td><td style={{padding:"9px 10px",color:"#fff"}}>{r.product}</td><td style={{padding:"9px 10px",color:"#c0d4e8"}}>{r.buyerName}</td><td style={{padding:"9px 10px",color:profit(r)>=0?"#22c55e":"#ef4444",fontWeight:700}}>₦{fmt(profit(r))}</td></tr>)}</tbody>
                </table>
              )}
            </div>
            <div style={{background:"rgba(4,15,32,0.9)",border:"1px solid rgba(0,100,255,0.12)",borderRadius:12,padding:22}}>
              <h3 style={{color:"#fff",fontSize:15,fontWeight:700,marginBottom:16}}>By Product</h3>
              {productTotals.map(p=>(
                <div key={p.name} style={{marginBottom:14}}>
                  <div style={{display:"flex",justifyContent:"space-between",marginBottom:5}}><span style={{color:"#c0d4e8",fontSize:12}}>{p.name}</span><span style={{color:"#4d9fff",fontSize:12,fontWeight:700}}>{p.count}</span></div>
                  <div style={{background:"rgba(0,100,255,0.1)",borderRadius:4,height:5}}><div style={{background:"linear-gradient(90deg,#003d99,#0066ff)",height:5,borderRadius:4,width:`${records.length?(p.count/records.length)*100:0}%`,transition:"width 0.4s"}}/></div>
                </div>
              ))}
            </div>
          </div>
        </div>
      );
    }

    // ── DATA ENTRY ──
    const emptyForm={product:"",depot:"",buyerName:"",productPrice:"",sellingPrice:"",loadingExpenses:"",truckExpenses:"",remarks:""};
    function DataEntry({ onSave }) {
      const [form,setForm]=useState({...emptyForm}); const [success,setSuccess]=useState(false); const [errors,setErrors]=useState({});
      const set=(k,v)=>{setForm(f=>({...f,[k]:v}));setErrors(e=>({...e,[k]:""}));};
      const validate=()=>{const e={};if(!form.product)e.product="Required";if(!form.depot)e.depot="Required";if(!form.buyerName.trim())e.buyerName="Required";if(!form.productPrice)e.productPrice="Required";if(!form.sellingPrice)e.sellingPrice="Required";return e;};
      const handle=()=>{const e=validate();if(Object.keys(e).length){setErrors(e);return;}onSave({...form,datetime:new Date().toLocaleString("en-NG"),id:Date.now()});setForm({...emptyForm});setSuccess(true);setTimeout(()=>setSuccess(false),4000);};
      const inp=(k,extra={})=>({width:"100%",padding:"11px 14px",background:"rgba(255,255,255,0.04)",border:errors[k]?"1px solid #ef4444":"1px solid rgba(0,100,255,0.18)",borderRadius:8,color:"#fff",fontSize:14,outline:"none",boxSizing:"border-box",fontFamily:"'Segoe UI',sans-serif",...extra});
      const lbl={display:"block",color:"#5a8ab0",fontSize:11,fontWeight:700,marginBottom:6,letterSpacing:1,textTransform:"uppercase"};
      const grp={marginBottom:18};
      const netProfit=profit(form);
      return (
        <div style={{padding:28,maxWidth:820}}>
          <div style={{marginBottom:24}}><h2 style={{color:"#fff",fontSize:22,fontWeight:800,marginBottom:4}}>New Transaction Entry</h2><p style={{color:"#3a6a9b",fontSize:13}}>Date & time will be recorded automatically on submission</p></div>
          {success&&<div style={{background:"rgba(34,197,94,0.1)",border:"1px solid rgba(34,197,94,0.3)",borderRadius:8,padding:"12px 18px",color:"#4ade80",fontSize:14,marginBottom:22}}>✅ Transaction saved successfully! Ready for next entry.</div>}
          <div style={{background:"rgba(4,15,32,0.9)",border:"1px solid rgba(0,100,255,0.12)",borderRadius:12,padding:28}}>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"0 24px"}}>
              <div style={grp}>
                <label style={lbl}>Product *</label>
                <select value={form.product} onChange={e=>set("product",e.target.value)} style={inp("product")}><option value="">-- Select Product --</option>{PRODUCTS.map(p=><option key={p} value={p}>{p}</option>)}</select>
                {errors.product&&<span style={{color:"#ef4444",fontSize:11}}>⚠ {errors.product}</span>}
              </div>
              <div style={grp}>
                <label style={lbl}>Loading Depot *</label>
                <select value={form.depot} onChange={e=>set("depot",e.target.value)} style={inp("depot")}><option value="">-- Select Depot --</option>{DEPOTS.map(d=><option key={d} value={d}>{d}</option>)}</select>
                {errors.depot&&<span style={{color:"#ef4444",fontSize:11}}>⚠ {errors.depot}</span>}
              </div>
              <div style={{...grp,gridColumn:"1 / -1"}}>
                <label style={lbl}>Buyer Name *</label>
                <input value={form.buyerName} onChange={e=>set("buyerName",e.target.value)} placeholder="Full name or company name" style={inp("buyerName")}/>
                {errors.buyerName&&<span style={{color:"#ef4444",fontSize:11}}>⚠ {errors.buyerName}</span>}
              </div>
              {[["productPrice","Product Price (₦) *","Cost price from depot"],["sellingPrice","Selling Price (₦) *","Price sold to buyer"],["loadingExpenses","Loading Expenses (₦)","Depot loading charges"],["truckExpenses","Truck Expenses (₦)","Transportation & logistics"]].map(([key,label,ph])=>(
                <div key={key} style={grp}>
                  <label style={lbl}>{label}</label>
                  <input type="number" value={form[key]} onChange={e=>set(key,e.target.value)} placeholder={ph} style={inp(key)}/>
                  {errors[key]&&<span style={{color:"#ef4444",fontSize:11}}>⚠ {errors[key]}</span>}
                </div>
              ))}
              <div style={{...grp,gridColumn:"1 / -1"}}>
                <label style={lbl}>Remarks</label>
                <textarea value={form.remarks} onChange={e=>set("remarks",e.target.value)} placeholder="Additional notes, payment terms..." rows={3} style={inp("remarks",{resize:"vertical"})}/>
              </div>
            </div>
            <div style={{background:netProfit>=0?"rgba(34,197,94,0.07)":"rgba(239,68,68,0.07)",border:`1px solid ${netProfit>=0?"rgba(34,197,94,0.2)":"rgba(239,68,68,0.2)"}`,borderRadius:10,padding:"16px 20px",marginBottom:22,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <div><div style={{color:"#5a8ab0",fontSize:11,fontWeight:700,letterSpacing:1,textTransform:"uppercase",marginBottom:4}}>Estimated Net Profit</div><div style={{color:"#8aabcc",fontSize:12}}>Sell Price − Cost − Load Exp − Truck Exp</div></div>
              <div style={{color:netProfit>=0?"#4ade80":"#f87171",fontSize:26,fontWeight:800}}>₦{fmt(netProfit)}</div>
            </div>
            <button onClick={handle} style={{padding:"13px 36px",background:"linear-gradient(135deg,#003d99,#0066ff)",color:"#fff",border:"none",borderRadius:8,fontSize:15,fontWeight:800,cursor:"pointer",letterSpacing:1.2,boxShadow:"0 4px 20px rgba(0,100,255,0.25)"}}>
              💾 SAVE TRANSACTION
            </button>
          </div>
        </div>
      );
    }

    // ── RECORDS ──
    function Records({ records, onDelete }) {
      const [search,setSearch]=useState(""); const [filterProduct,setFilterProduct]=useState(""); const [filterDepot,setFilterDepot]=useState(""); const [sortBy,setSortBy]=useState("newest");
      const filtered=useMemo(()=>{let data=records.filter(r=>(!search||r.buyerName.toLowerCase().includes(search.toLowerCase())||r.product.toLowerCase().includes(search.toLowerCase())||r.depot.toLowerCase().includes(search.toLowerCase()))&&(!filterProduct||r.product===filterProduct)&&(!filterDepot||r.depot===filterDepot));if(sortBy==="newest")data=[...data].reverse();else if(sortBy==="profit_hi")data=[...data].sort((a,b)=>profit(b)-profit(a));else if(sortBy==="profit_lo")data=[...data].sort((a,b)=>profit(a)-profit(b));return data;},[records,search,filterProduct,filterDepot,sortBy]);
      const totalProfit=filtered.reduce((s,r)=>s+profit(r),0);
      const totalRevenue=filtered.reduce((s,r)=>s+Number(r.sellingPrice||0),0);
      const inp={padding:"9px 13px",background:"rgba(255,255,255,0.04)",border:"1px solid rgba(0,100,255,0.18)",borderRadius:8,color:"#fff",fontSize:13,outline:"none",fontFamily:"'Segoe UI',sans-serif"};
      return (
        <div style={{padding:28}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:22,flexWrap:"wrap",gap:14}}>
            <div><h2 style={{color:"#fff",fontSize:22,fontWeight:800,marginBottom:4}}>Transaction Records</h2><p style={{color:"#3a6a9b",fontSize:13}}>{filtered.length} record{filtered.length!==1?"s":""} • Revenue: ₦{fmt(totalRevenue)} • Profit: <span style={{color:totalProfit>=0?"#22c55e":"#ef4444"}}>₦{fmt(totalProfit)}</span></p></div>
            <div style={{display:"flex",gap:10}}>
              <button onClick={()=>exportCSV(filtered)} style={{padding:"9px 16px",background:"rgba(34,197,94,0.12)",border:"1px solid rgba(34,197,94,0.28)",borderRadius:8,color:"#4ade80",cursor:"pointer",fontSize:13,fontWeight:600}}>📊 Export CSV</button>
              <button onClick={()=>exportPDF(filtered)} style={{padding:"9px 16px",background:"rgba(239,68,68,0.12)",border:"1px solid rgba(239,68,68,0.28)",borderRadius:8,color:"#f87171",cursor:"pointer",fontSize:13,fontWeight:600}}>📄 Export PDF</button>
            </div>
          </div>
          <div style={{display:"flex",gap:10,marginBottom:18,flexWrap:"wrap"}}>
            <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="🔍 Search buyer, product, depot..." style={{...inp,flex:1,minWidth:200}}/>
            <select value={filterProduct} onChange={e=>setFilterProduct(e.target.value)} style={inp}><option value="">All Products</option>{PRODUCTS.map(p=><option key={p} value={p}>{p}</option>)}</select>
            <select value={filterDepot} onChange={e=>setFilterDepot(e.target.value)} style={inp}><option value="">All Depots</option>{DEPOTS.map(d=><option key={d} value={d}>{d}</option>)}</select>
            <select value={sortBy} onChange={e=>setSortBy(e.target.value)} style={inp}><option value="newest">Newest First</option><option value="profit_hi">Highest Profit</option><option value="profit_lo">Lowest Profit</option></select>
          </div>
          <div style={{background:"rgba(4,15,32,0.9)",border:"1px solid rgba(0,100,255,0.12)",borderRadius:12,overflow:"hidden"}}>
            <div style={{overflowX:"auto"}}>
              <table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}>
                <thead><tr style={{background:"rgba(0,50,130,0.35)"}}>{["Date & Time","Product","Depot","Buyer","Cost Price","Sell Price","Load Exp","Truck Exp","Net Profit","Remarks",""].map(h=><th key={h} style={{color:"#3a6a9b",textAlign:"left",padding:"12px 13px",fontWeight:700,fontSize:10,textTransform:"uppercase",letterSpacing:0.8,whiteSpace:"nowrap"}}>{h}</th>)}</tr></thead>
                <tbody>
                  {filtered.length===0?<tr><td colSpan={11} style={{padding:"48px",textAlign:"center",color:"#3a6a9b",fontSize:14}}><div style={{fontSize:32,marginBottom:8}}>🔍</div>No records found.</td></tr>
                  :filtered.map((r,i)=>(
                    <tr key={r.id} style={{borderTop:"1px solid rgba(0,100,255,0.07)",background:i%2===0?"transparent":"rgba(255,255,255,0.01)"}}>
                      <td style={{padding:"10px 13px",color:"#5a8ab0",fontSize:11,whiteSpace:"nowrap"}}>{r.datetime}</td>
                      <td style={{padding:"10px 13px"}}><span style={{background:"rgba(0,100,255,0.15)",color:"#4d9fff",padding:"3px 8px",borderRadius:4,fontSize:11,fontWeight:700}}>{r.product}</span></td>
                      <td style={{padding:"10px 13px",color:"#8aabcc"}}>{r.depot}</td>
                      <td style={{padding:"10px 13px",color:"#fff",fontWeight:500}}>{r.buyerName}</td>
                      <td style={{padding:"10px 13px",color:"#8aabcc"}}>₦{fmt(r.productPrice)}</td>
                      <td style={{padding:"10px 13px",color:"#c0d4e8"}}>₦{fmt(r.sellingPrice)}</td>
                      <td style={{padding:"10px 13px",color:"#8aabcc"}}>₦{fmt(r.loadingExpenses)}</td>
                      <td style={{padding:"10px 13px",color:"#8aabcc"}}>₦{fmt(r.truckExpenses)}</td>
                      <td style={{padding:"10px 13px",fontWeight:800,color:profit(r)>=0?"#4ade80":"#f87171",whiteSpace:"nowrap"}}>₦{fmt(profit(r))}</td>
                      <td style={{padding:"10px 13px",color:"#5a8ab0",maxWidth:130,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}} title={r.remarks}>{r.remarks||"—"}</td>
                      <td style={{padding:"10px 13px"}}><button onClick={()=>{if(window.confirm("Delete this record permanently?"))onDelete(r.id);}} style={{background:"rgba(239,68,68,0.1)",border:"1px solid rgba(239,68,68,0.2)",borderRadius:6,color:"#f87171",cursor:"pointer",padding:"4px 9px",fontSize:12}}>🗑</button></td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          </div>
        </div>
      );
    }

    // ── CALCULATOR ──
    function Calculator() {
      const [display,setDisplay]=useState("0"); const [prev,setPrev]=useState(null); const [op,setOp]=useState(null); const [fresh,setFresh]=useState(false);
      const pressNum=(n)=>{if(fresh){setDisplay(String(n));setFresh(false);}else setDisplay(display==="0"?String(n):display+n);};
      const pressDot=()=>{if(fresh){setDisplay("0.");setFresh(false);return;}if(!display.includes("."))setDisplay(display+".");};
      const pressOp=(o)=>{setPrev(parseFloat(display));setOp(o);setFresh(true);};
      const pressEq=()=>{
        if(op===null||prev===null)return;
        const cur=parseFloat(display); let res;
        if(op==="+")res=prev+cur; else if(op==="-")res=prev-cur; else if(op==="×")res=prev*cur; else if(op==="÷")res=cur!==0?prev/cur:"Error";
        setDisplay(res==="Error"?"Error":String(parseFloat(res.toFixed(10))));
        setPrev(null);setOp(null);setFresh(true);
      };
      const clear=()=>{setDisplay("0");setPrev(null);setOp(null);setFresh(false);};
      const toggleSign=()=>setDisplay(String(parseFloat(display)*-1));
      const percent=()=>setDisplay(String(parseFloat(display)/100));
      const Btn=({label,onClick,bg="#1a3a6b",tc="#fff",span=1})=>(
        <button onClick={onClick} style={{gridColumn:`span ${span}`,background:bg,color:tc,border:"none",borderRadius:10,fontSize:18,fontWeight:600,cursor:"pointer",padding:"15px 0",transition:"filter 0.1s"}}
          onMouseDown={e=>e.currentTarget.style.filter="brightness(1.4)"} onMouseUp={e=>e.currentTarget.style.filter="brightness(1)"}>
          {label}
        </button>
      );
      return (
        <div style={{background:"rgba(4,15,32,0.9)",border:"1px solid rgba(0,100,255,0.12)",borderRadius:16,padding:20,width:"100%"}}>
          <h3 style={{color:"#fff",fontSize:14,fontWeight:700,marginBottom:14,letterSpacing:1}}>🧮 CALCULATOR</h3>
          <div style={{background:"#020c1b",borderRadius:10,padding:"14px 16px",marginBottom:12,textAlign:"right",border:"1px solid rgba(0,100,255,0.15)"}}>
            <div style={{color:"#3a6a9b",fontSize:12,minHeight:18}}>{prev!==null?`${prev} ${op}`:""}</div>
            <div style={{color:"#fff",fontSize:30,fontWeight:300,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{display}</div>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:8}}>
            <Btn label="AC" onClick={clear} bg="#1e3a5f"/>
            <Btn label="+/-" onClick={toggleSign} bg="#1e3a5f"/>
            <Btn label="%" onClick={percent} bg="#1e3a5f"/>
            <Btn label="÷" onClick={()=>pressOp("÷")} bg={op==="÷"?"#0066ff":"#003d99"}/>
            <Btn label="7" onClick={()=>pressNum("7")}/>
            <Btn label="8" onClick={()=>pressNum("8")}/>
            <Btn label="9" onClick={()=>pressNum("9")}/>
            <Btn label="×" onClick={()=>pressOp("×")} bg={op==="×"?"#0066ff":"#003d99"}/>
            <Btn label="4" onClick={()=>pressNum("4")}/>
            <Btn label="5" onClick={()=>pressNum("5")}/>
            <Btn label="6" onClick={()=>pressNum("6")}/>
            <Btn label="-" onClick={()=>pressOp("-")} bg={op==="-"?"#0066ff":"#003d99"}/>
            <Btn label="1" onClick={()=>pressNum("1")}/>
            <Btn label="2" onClick={()=>pressNum("2")}/>
            <Btn label="3" onClick={()=>pressNum("3")}/>
            <Btn label="+" onClick={()=>pressOp("+")} bg={op==="+"?"#0066ff":"#003d99"}/>
            <Btn label="0" onClick={()=>pressNum("0")} span={2}/>
            <Btn label="." onClick={pressDot}/>
            <Btn label="=" onClick={pressEq} bg="linear-gradient(135deg,#003d99,#0066ff)"/>
          </div>
        </div>
      );
    }

    // ── SETTINGS ──
    function Settings() {
      const [curr,setCurr]=useState(""); const [newPass,setNewPass]=useState(""); const [confirm,setConfirm]=useState(""); const [msg,setMsg]=useState(null);
      const [shows,setShows]=useState({curr:false,new:false,confirm:false});
      const handle=()=>{
        const creds=getCredentials();
        if(!curr||!newPass||!confirm){setMsg({type:"error",text:"Please fill in all fields."});return;}
        if(curr!==creds.password){setMsg({type:"error",text:"Current password is incorrect."});return;}
        if(newPass.length<6){setMsg({type:"error",text:"New password must be at least 6 characters."});return;}
        if(newPass!==confirm){setMsg({type:"error",text:"New passwords do not match."});return;}
        saveCredentials({...creds,password:newPass});
        setMsg({type:"success",text:"✅ Password changed! Use your new password next time you login."});
        setCurr("");setNewPass("");setConfirm("");
      };
      const inp=(k,extra={})=>({width:"100%",padding:"11px 44px 11px 14px",background:"rgba(255,255,255,0.04)",border:"1px solid rgba(0,100,255,0.18)",borderRadius:8,color:"#fff",fontSize:14,outline:"none",boxSizing:"border-box",...extra});
      const lbl={display:"block",color:"#5a8ab0",fontSize:11,fontWeight:700,marginBottom:6,letterSpacing:1,textTransform:"uppercase"};
      return (
        <div style={{padding:28,maxWidth:820}}>
          <div style={{marginBottom:24}}><h2 style={{color:"#fff",fontSize:22,fontWeight:800,marginBottom:4}}>Settings</h2><p style={{color:"#3a6a9b",fontSize:13}}>Manage your account and preferences</p></div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:20,alignItems:"start"}}>

            {/* Change Password */}
            <div style={{background:"rgba(4,15,32,0.9)",border:"1px solid rgba(0,100,255,0.12)",borderRadius:12,padding:28}}>
              <h3 style={{color:"#fff",fontSize:16,fontWeight:700,marginBottom:6}}>🔐 Change Password</h3>
              <p style={{color:"#3a6a9b",fontSize:12,marginBottom:22}}>Your new password takes effect immediately</p>
              {msg&&<div style={{background:msg.type==="error"?"rgba(239,68,68,0.1)":"rgba(34,197,94,0.1)",border:`1px solid ${msg.type==="error"?"rgba(239,68,68,0.3)":"rgba(34,197,94,0.3)"}`,borderRadius:8,padding:"10px 14px",color:msg.type==="error"?"#f87171":"#4ade80",fontSize:13,marginBottom:20}}>{msg.text}</div>}
              {[["Current Password",curr,setCurr,"curr"],["New Password",newPass,setNewPass,"new"],["Confirm New Password",confirm,setConfirm,"confirm"]].map(([label,val,set,key])=>(
                <div key={key} style={{marginBottom:18}}>
                  <label style={lbl}>{label}</label>
                  <div style={{position:"relative"}}>
                    <input type={shows[key]?"text":"password"} value={val} onChange={e=>{set(e.target.value);setMsg(null);}} placeholder="••••••••" style={inp(key)}/>
                    <button onClick={()=>setShows(s=>({...s,[key]:!s[key]}))} style={{position:"absolute",right:12,top:"50%",transform:"translateY(-50%)",background:"none",border:"none",color:"#3a6a9b",cursor:"pointer",fontSize:15}}>{shows[key]?"🙈":"👁"}</button>
                  </div>
                </div>
              ))}
              <button onClick={handle} style={{padding:"12px 28px",background:"linear-gradient(135deg,#003d99,#0066ff)",color:"#fff",border:"none",borderRadius:8,fontSize:14,fontWeight:800,cursor:"pointer",letterSpacing:1,boxShadow:"0 4px 16px rgba(0,100,255,0.25)"}}>
                🔒 UPDATE PASSWORD
              </button>
            </div>

            {/* Calculator */}
            <Calculator />
          </div>

          {/* System Info */}
          <div style={{background:"rgba(4,15,32,0.9)",border:"1px solid rgba(0,100,255,0.12)",borderRadius:12,padding:24,marginTop:20}}>
            <h3 style={{color:"#fff",fontSize:15,fontWeight:700,marginBottom:16}}>ℹ️ System Information</h3>
            <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(180px,1fr))",gap:14}}>
              {[["Application","AIF Management System"],["Version","1.0.0"],["Storage","Browser LocalStorage"],["Access","Single Admin User"],["Export Formats","CSV, PDF"]].map(([k,v])=>(
                <div key={k} style={{background:"rgba(0,100,255,0.06)",borderRadius:8,padding:"12px 16px"}}>
                  <div style={{color:"#3a6a9b",fontSize:11,fontWeight:600,textTransform:"uppercase",letterSpacing:0.8,marginBottom:4}}>{k}</div>
                  <div style={{color:"#c0d4e8",fontSize:13}}>{v}</div>
                </div>
              ))}
            </div>
          </div>
        </div>
      );
    }

    // ── APP ──
    function App() {
      const [loggedIn,setLoggedIn]=useState(false); const [page,setPage]=useState("dashboard"); const [records,setRecords]=useState(loadRecords); const [collapsed,setCollapsed]=useState(false);
      useEffect(()=>{saveRecords(records);},[records]);
      const addRecord=(r)=>setRecords(prev=>[...prev,r]);
      const delRecord=(id)=>setRecords(prev=>prev.filter(r=>r.id!==id));
      if(!loggedIn)return <LoginPage onLogin={()=>setLoggedIn(true)}/>;
      return (
        <div style={{display:"flex",minHeight:"100vh",background:"#020c1b"}}>
          <Sidebar page={page} setPage={setPage} onLogout={()=>{setLoggedIn(false);setPage("dashboard");}} collapsed={collapsed} setCollapsed={setCollapsed}/>
          <main style={{flex:1,overflowY:"auto",minHeight:"100vh"}}>
            {page==="dashboard"&&<Dashboard records={records} setPage={setPage}/>}
            {page==="entry"&&<DataEntry onSave={addRecord}/>}
            {page==="records"&&<Records records={records} onDelete={delRecord}/>}
            {page==="settings"&&<Settings/>}
          </main>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
  </script>
</body>
</html>
